<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're offline — Mentor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F9F7EC;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .logo {
      font-size: 24px;
      font-weight: 800;
      color: #0A3323;
      margin-bottom: 40px;
    }
    .logo span { color: #D3968C; }
    .icon {
      font-size: 56px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 22px;
      font-weight: 800;
      color: #0A3323;
      margin-bottom: 10px;
    }
    p {
      font-size: 14px;
      color: #839958;
      line-height: 1.6;
      max-width: 280px;
      margin: 0 auto 32px;
    }
    button {
      background: #0A3323;
      color: #F7F4D5;
      border: none;
      border-radius: 12px;
      padding: 13px 28px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <div class="logo">mentor<span>.</span></div>
  <div class="icon">📶</div>
  <h1>You're offline</h1>
  <p>Check your internet connection and try again. Some pages you've visited recently might still be available.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
